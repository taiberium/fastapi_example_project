apiVersion: v1
kind: Namespace
metadata:
  name: fastapi-example
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-example
  namespace: fastapi-example
  labels:
    app: fastapi-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-example
  template:
    metadata:
      labels:
        app: fastapi-example
    spec:
      containers:
        - name: app
          image: fastapi-example:latest
          imagePullPolicy: Never          # image is imported into k3s containerd, not pulled
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: "dev"                 # non-prod: skips Google/JWT prod-secret validation
            - name: APP_LOG_LEVEL
              value: "INFO"
            # SQLite on an ephemeral volume — no DB credentials to manage for the demo.
            - name: APP_DATABASE_URL
              value: "sqlite:////data/app.db"
            # --- OpenTelemetry -> Grafana-stack collector on myserver-personal ---
            - name: APP_OTEL_ENABLED
              value: "true"
            - name: APP_OTEL_SERVICE_NAME
              value: "fastapi-example"
            - name: APP_OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://49.12.196.176:4328"
            - name: APP_SECRET_KEY
              value: "__SECRET_KEY__"      # substituted at deploy time (random)
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-example
  namespace: fastapi-example
  labels:
    app: fastapi-example
spec:
  type: NodePort
  selector:
    app: fastapi-example
  ports:
    - name: http
      port: 80
      targetPort: 8000
      nodePort: 30080
